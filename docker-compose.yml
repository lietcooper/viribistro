services:
  postgres:
    image: postgres:16-alpine
    container_name: bistro-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: bistro
      POSTGRES_PASSWORD: bistro
      POSTGRES_DB: bistro_dev
    ports:
      - "5433:5432"
    volumes:
      - bistro-pg-data:/var/lib/postgresql/data
      - ./backend/prisma/init-test-db.sql:/docker-entrypoint-initdb.d/init-test-db.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bistro -d bistro_dev"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  bistro-pg-data:
